<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0F14">
  <title>Side Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B0F14; --surface: #141A22; --border: #263040;
      --text: #D8E4F0; --muted: #607080; --accent: #4A9ECC;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    html, body { min-height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 400px; margin: 0 auto; padding: 48px 16px; }
    .eyebrow { font-size: 10px; color: var(--accent); letter-spacing: .18em; text-transform: uppercase; margin-bottom: 6px; }
    .title { font-size: 26px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 24px; }
    a.card {
      display: block; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; margin-bottom: 10px; text-decoration: none;
      color: var(--text); transition: border-color .15s;
    }
    a.card:hover { border-color: var(--accent); }
    .card-name { font-size: 16px; font-weight: 700; }
    .card-desc { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Side Projects</div>
    <div class="title">Tools &amp; experiments</div>
    <a class="card" href="vent/">
      <div class="card-name">Vent or Seal?</div>
      <div class="card-desc">Compare indoor vs. outdoor dew point to decide whether to ventilate or keep the house sealed.</div>
    </a>
    <a class="card" href="mileslip/">
      <div class="card-name">Mile&middot;Slip</div>
      <div class="card-desc">Log work codes for the day and tally mileage between job sites, with a copyable daily slip.</div>
    </a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vent or Seal">
  <meta name="theme-color" content="#0B0F14">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Vent or Seal?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0B0F14;
      --surface: #141A22;
      --border:  #263040;
      --text:    #D8E4F0;
      --muted:   #607080;
      --accent:  #4A9ECC;
      --green:   #3CC470;
      --yellow:  #D4A017;
      --red:     #E05050;
      --mono: ui-monospace, 'SF Mono', 'Fira Code', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 400px;
      margin: 0 auto;
      padding: 16px 16px 48px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 16px;
      margin-bottom: 22px;
    }
    .eyebrow { font-size: 10px; color: var(--accent); letter-spacing: .18em; text-transform: uppercase; margin-bottom: 4px; }
    .title   { font-size: 24px; font-weight: 700; letter-spacing: -.03em; }
    .clear-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 5px 12px;
      font-size: 11px; font-family: var(--sans); cursor: pointer;
    }

    /* ── Cards ── */
    .section {
      background: var(--surface); border-radius: 12px;
      padding: 16px; border: 1px solid var(--border); margin-bottom: 10px;
    }
    .section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px; min-height: 28px;
    }
    .section-label { font-size: 10px; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; font-weight: 600; }

    /* ── Location setup ── */
    .loc-row { display: flex; gap: 6px; align-items: center; }
    .loc-input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 10px;
      font-size: 12px; font-family: var(--sans); outline: none; width: 150px;
      transition: border-color .15s;
    }
    .loc-input:focus  { border-color: var(--accent); }
    .loc-input::placeholder { color: var(--muted); font-size: 11px; }
    .loc-input.error  { border-color: var(--red); }
    .set-btn {
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 6px; padding: 5px 11px;
      font-size: 11px; font-weight: 700; letter-spacing: .05em;
      font-family: var(--sans); cursor: pointer; white-space: nowrap;
    }
    .set-btn:disabled { opacity: .4; cursor: default; }
    .change-link {
      font-size: 10px; color: var(--muted); cursor: pointer;
      text-align: right; margin-top: 6px; letter-spacing: .04em;
      display: none;
    }
    .change-link:hover { color: var(--accent); }

    /* ── Fetch button ── */
    .fetch-btn {
      background: var(--accent); color: #0B0F14;
      border: 1px solid var(--accent); border-radius: 6px;
      padding: 5px 13px; font-size: 11px; font-weight: 700;
      font-family: var(--sans); letter-spacing: .06em;
      text-transform: uppercase; cursor: pointer;
    }
    .fetch-btn:disabled { opacity: .45; cursor: default; }

    /* ── Inputs ── */
    .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
    .input-group label {
      display: block; font-size: 10px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase; font-weight: 600; margin-bottom: 5px;
    }
    .input-wrap {
      display: flex; align-items: center; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px;
      overflow: hidden; transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    .input-wrap input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 18px; padding: 10px 10px;
      width: 100%; font-family: var(--mono); font-weight: 500;
    }
    .input-wrap input::placeholder { color: var(--border); }
    .unit { color: var(--muted); font-size: 12px; padding-right: 10px; font-family: var(--mono); flex-shrink: 0; }

    /* ── DP Readout ── */
    .dp-readout { text-align: center; padding: 10px 0 4px; }
    .dp-number {
      font-size: 46px; font-weight: 800; line-height: 1;
      font-family: var(--mono); letter-spacing: -.03em;
      color: var(--border); transition: color .2s;
    }
    .dp-number.live { color: var(--text); }
    .dp-suffix { font-size: 18px; color: var(--muted); display: none; }
    .dp-tag { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }

    /* ── Verdict ── */
    .verdict { border-radius: 12px; padding: 22px 20px; border: 1px solid var(--border); text-align: center; transition: border-color .2s, background .2s; }
    .verdict-placeholder { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .verdict-placeholder .accent { color: var(--accent); }
    .verdict-label { font-size: 32px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 8px; line-height: 1; }
    .verdict-sub   { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 280px; margin: 0 auto; }
    .verdict-compare { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }
    .compare-item  { text-align: center; }
    .compare-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; }
    .compare-value { font-size: 18px; font-weight: 700; font-family: var(--mono); }
    .compare-vs    { color: var(--border); font-size: 18px; align-self: center; }

    .footer-note { margin-top: 14px; font-size: 10px; color: var(--border); text-align: center; letter-spacing: .05em; }

    /* ── Indoor scan ── */
    .scan-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 5px 11px;
      font-size: 11px; font-family: var(--sans); cursor: pointer;
      letter-spacing: .04em; white-space: nowrap;
    }
    .scan-btn:active  { border-color: var(--accent); color: var(--accent); }
    .scan-btn:disabled { opacity: .5; cursor: default; }
    .scan-status {
      display: none; margin-top: 10px; font-size: 11px;
      color: var(--muted); text-align: center; letter-spacing: .03em;
    }
    .scan-status.show  { display: block; }
    .scan-status.error { color: var(--red); }

    /* ── History ── */
    .hist-auto {
      font-size: 9px; color: var(--muted); letter-spacing: .12em;
      text-transform: uppercase; opacity: .8;
    }
    .hist-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0; }
    .hist-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 9px 0; border-top: 1px solid var(--border);
    }
    .hist-row:first-child { border-top: none; }
    .hist-main  { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .hist-label { font-size: 13px; font-weight: 700; letter-spacing: -.01em; }
    .hist-date  { font-size: 10px; color: var(--muted); letter-spacing: .04em; }
    .hist-vals  { font-size: 11px; color: var(--text); font-family: var(--mono); }
    .hist-del {
      background: transparent; border: none; color: var(--muted);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 0 4px; flex-shrink: 0;
    }
    .hist-del:active { color: var(--red); }
    .hist-clear {
      display: none; font-size: 10px; color: var(--muted); cursor: pointer;
      text-align: right; margin-top: 8px; letter-spacing: .04em;
    }
    .hist-clear:hover { color: var(--red); }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="eyebrow">Moisture Monitor</div>
      <div class="title">Vent or Seal?</div>
    </div>
    <button class="clear-btn" onclick="clearReadings()">Clear</button>
  </div>

  <!-- OUTDOOR — top -->
  <div class="section">
    <div class="section-header">
      <span class="section-label" id="out-lbl">Outdoor</span>
      <div id="header-right"></div>
    </div>
    <div id="change-row" class="change-link" onclick="changeLocation()">⌀ change location</div>
    <div class="inputs">
      <div class="input-group">
        <label>Temp</label>
        <div class="input-wrap">
          <input type="text" inputmode="numeric" id="out-temp" placeholder="72" maxlength="4" autocomplete="off">
          <span class="unit">°F</span>
        </div>
      </div>
      <div class="input-group">
        <label>Humidity</label>
        <div class="input-wrap">
          <input type="text" inputmode="numeric" id="out-rh" placeholder="55" maxlength="3" autocomplete="off">
          <span class="unit">%</span>
        </div>
      </div>
    </div>
    <div class="dp-readout">
      <div><span class="dp-number" id="out-dp">—</span><span class="dp-suffix" id="out-sfx">°F</span></div>
      <div class="dp-tag">dew point</div>
    </div>
  </div>

  <!-- INDOOR — bottom -->
  <div class="section">
    <div class="section-header">
      <span class="section-label">Indoor</span>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">📷 Scan</button>
      <input type="file" accept="image/*" capture="environment" id="scan-file" style="display:none" onchange="handleScanFile(event)">
    </div>
    <div class="inputs">
      <div class="input-group">
        <label>Temp</label>
        <div class="input-wrap">
          <input type="text" inputmode="numeric" id="in-temp" placeholder="69" maxlength="4" autocomplete="off">
          <span class="unit">°F</span>
        </div>
      </div>
      <div class="input-group">
        <label>Humidity</label>
        <div class="input-wrap">
          <input type="text" inputmode="numeric" id="in-rh" placeholder="56" maxlength="3" autocomplete="off">
          <span class="unit">%</span>
        </div>
      </div>
    </div>
    <div class="dp-readout">
      <div><span class="dp-number" id="in-dp">—</span><span class="dp-suffix" id="in-sfx">°F</span></div>
      <div class="dp-tag">dew point</div>
    </div>
    <div class="scan-status" id="scan-status"></div>
    <div class="hist-clear" id="fix-clear" onclick="clearFixes()" style="display:none">⌀ forget scan corrections</div>
  </div>

  <!-- VERDICT -->
  <div class="verdict" id="verdict">
    <div class="verdict-placeholder" id="verdict-hint">
      Set your home location above, then enter indoor temp + humidity.
    </div>
  </div>

  <div class="footer-note">Vent when outdoor DP &lt; indoor DP</div>

  <!-- HISTORY -->
  <div class="section" id="history-section">
    <div class="section-header">
      <span class="section-label">History</span>
      <span class="hist-auto">auto-saved</span>
    </div>
    <div id="hist-list"></div>
    <div class="hist-clear" id="hist-clear" onclick="clearLog()">clear all</div>
  </div>
</div>

<script>
  const G='#3CC470', Y='#D4A017', R='#E05050', TX='#D8E4F0', BD='#263040', AC='#4A9ECC';
  const LS_KEY  = 'ventseal_home';   // saved location
  const LS_LAST = 'ventseal_last';   // last fetched outdoor reading (for offline)
  const LS_LOG  = 'ventseal_log';    // saved reading history

  // Snapshot of the current computed reading, used by the History log.
  let current = { oDP:null, iDP:null, label:null, color:null };

  // Precise outdoor dew point from the weather API (computed by Open-Meteo
  // from full-precision values, before rounding). When the outdoor fields
  // still hold exactly the fetched temp/RH, we prefer this over recomputing
  // from the rounded inputs — avoids ~1° rounding drift. Cleared/ignored the
  // moment you hand-edit an outdoor field. Shape: { temp, rh, dp }.
  let apiOutdoor = null;

  const $ = id => document.getElementById(id);
  const fields = {
    outTemp: $('out-temp'), outRH: $('out-rh'),
    inTemp:  $('in-temp'), inRH:  $('in-rh')
  };
  const pLen = { outTemp:0, outRH:0, inTemp:0, inRH:0 };

  // ── localStorage helpers ──
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch { return null; }
  }
  function setSaved(obj) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch {}
  }
  function clearSaved() {
    try { localStorage.removeItem(LS_KEY); } catch {}
  }
  function getLast() {
    try { return JSON.parse(localStorage.getItem(LS_LAST)); } catch { return null; }
  }
  function setLast(obj) {
    try { localStorage.setItem(LS_LAST, JSON.stringify(obj)); } catch {}
  }
  function clearLast() {
    try { localStorage.removeItem(LS_LAST); } catch {}
  }

  // ── Dew point calc ──
  function calcDP(f, rh) {
    const T=(parseFloat(f)-32)*5/9, RH=parseFloat(rh);
    if (isNaN(T)||isNaN(RH)||RH<=0||RH>100) return null;
    const g=Math.log(RH/100)+(17.625*T)/(243.04+T);
    return (243.04*g/(17.625-g))*9/5+32;
  }

  function done(val, prev) {
    const digits = val.replace(/-/g,'');
    if (val.length<=prev) return false;
    return digits.length===3 || (digits.length===2 && digits[0]!=='1');
  }

  function jump(el) { if(el){ el.focus(); el.select(); } }

  // ── Render dew point readout ──
  function setReadout(numId, sfxId, val) {
    const n=$(numId), s=$(sfxId);
    if (val!==null) { n.textContent=val.toFixed(1); n.classList.add('live'); s.style.display='inline'; }
    else            { n.textContent='—'; n.classList.remove('live'); s.style.display='none'; }
  }

  // ── Verdict ──
  function render() {
    // Outdoor: prefer the API's precise dew point if the fields still hold
    // exactly what was fetched (no manual edit since). Otherwise compute.
    let oDP;
    if (apiOutdoor &&
        fields.outTemp.value === String(apiOutdoor.temp) &&
        fields.outRH.value   === String(apiOutdoor.rh)) {
      oDP = apiOutdoor.dp;
    } else {
      oDP = calcDP(fields.outTemp.value, fields.outRH.value);
    }
    const iDP=calcDP(fields.inTemp.value,  fields.inRH.value);
    setReadout('out-dp','out-sfx',oDP);
    setReadout('in-dp', 'in-sfx', iDP);

    const v=$('verdict');
    if (oDP===null||iDP===null) {
      v.style.cssText='border:1px solid '+BD+';background:transparent';
      const hint = getSaved()
        ? 'Enter indoor temp + humidity for a reading.'
        : 'Set your home location above, then enter indoor temp + humidity.';
      v.innerHTML=`<div class="verdict-placeholder">${hint}</div>`;
      current = { oDP:null, iDP:null, label:null, color:null };
      scheduleAutoLog();
      return;
    }
    const d=oDP-iDP;
    let label,sub,color;
    if      (d<=-5) { label='Open Up';     sub=`Outdoor is ${Math.abs(d).toFixed(1)}°F drier — actively helps`;  color=G; }
    else if (d<=0)  { label='OK to Vent';  sub=`Outdoor is ${Math.abs(d).toFixed(1)}°F drier — small gain`;       color=G; }
    else if (d<=3)  { label='Borderline';  sub='Nearly equal — comfort choice only';                               color=Y; }
    else            { label='Stay Closed'; sub=`Outdoor is ${d.toFixed(1)}°F wetter — importing moisture`;         color=R; }

    current = { oDP, iDP, label, color };
    scheduleAutoLog();

    v.style.cssText=`border:1px solid ${color}55;background:${color}12`;
    v.innerHTML=`
      <div class="verdict-label" style="color:${color}">${label}</div>
      <div class="verdict-sub">${sub}</div>
      <div class="verdict-compare">
        <div class="compare-item">
          <div class="compare-label">Out</div>
          <div class="compare-value" style="color:${oDP>iDP?R:G}">${oDP.toFixed(1)}°</div>
        </div>
        <div class="compare-vs">vs</div>
        <div class="compare-item">
          <div class="compare-label">In</div>
          <div class="compare-value" style="color:${TX}">${iDP.toFixed(1)}°</div>
        </div>
      </div>`;
  }

  // ── Header right: setup vs fetch button ──
  function renderControls() {
    const loc = getSaved();
    const hr = $('header-right');
    const cr = $('change-row');

    if (loc) {
      $('out-lbl').textContent = `Outdoor · ${loc.name}`;
      hr.innerHTML = `<button class="fetch-btn" id="fetch-btn" onclick="fetchOutdoor()">Fetch Live</button>`;
      cr.style.display = 'block';
    } else {
      $('out-lbl').textContent = 'Outdoor';
      hr.innerHTML = `
        <div class="loc-row">
          <input class="loc-input" id="loc-input" type="text" placeholder="City or zip code"
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter') saveLocation()">
          <button class="set-btn" id="set-btn" onclick="saveLocation()">Set</button>
        </div>`;
      cr.style.display = 'none';
      // Focus the location input
      setTimeout(() => { const li=$('loc-input'); if(li) li.focus(); }, 100);
    }
  }

  // ── Save location ──
  async function saveLocation() {
    const li = $('loc-input');
    const sb = $('set-btn');
    if (!li) return;
    const q = li.value.trim();
    if (!q) { li.classList.add('error'); return; }

    if (!navigator.onLine) {
      li.classList.add('error');
      li.value = '';
      li.placeholder = 'Offline — connect to set location';
      return;
    }

    li.classList.remove('error');
    sb.textContent = '···';
    sb.disabled = true;

    try {
      const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`);
      const data = await res.json();

      if (!data.results || !data.results.length) {
        li.classList.add('error');
        li.value = '';
        li.placeholder = 'Not found — try city name';
        sb.textContent = 'Set';
        sb.disabled = false;
        return;
      }

      const { latitude, longitude, name, admin1 } = data.results[0];
      const locName = admin1 ? `${name}, ${admin1}` : name;
      setSaved({ lat: latitude, lon: longitude, name: locName });
      clearLast();
      renderControls();
      // Auto-fetch immediately after saving
      await fetchOutdoor();

    } catch {
      li.placeholder = 'Network error — try again';
      li.value = '';
      sb.textContent = 'Set';
      sb.disabled = false;
    }
  }

  // ── Change location ──
  function changeLocation() {
    clearSaved();
    clearLast();
    apiOutdoor = null;
    fields.outTemp.value = ''; fields.outRH.value = '';
    pLen.outTemp = 0; pLen.outRH = 0;
    renderControls();
    render();
  }

  // ── Fetch outdoor weather ──
  async function fetchOutdoor() {
    const loc = getSaved();
    if (!loc) { renderControls(); return; }

    const btn = $('fetch-btn');

    if (!navigator.onLine) {
      // Offline: keep showing the last reading (if any) instead of failing hard.
      const last = getLast();
      if (last) $('out-lbl').textContent = `Outdoor · ${loc.name} · ${last.time} (offline)`;
      else      $('out-lbl').textContent = `Outdoor · ${loc.name} · offline — no saved reading`;
      return;
    }

    if (btn) { btn.textContent = '···'; btn.disabled = true; }

    try {
      const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat.toFixed(4)}&longitude=${loc.lon.toFixed(4)}&current=temperature_2m,relative_humidity_2m,dew_point_2m&temperature_unit=fahrenheit`);
      const data = await res.json();

      const tempNum = Math.round(data.current.temperature_2m);
      const rhNum   = Math.round(data.current.relative_humidity_2m);
      const temp = String(tempNum);
      const rh   = String(rhNum);
      fields.outTemp.value = temp; pLen.outTemp = temp.length;
      fields.outRH.value   = rh;  pLen.outRH   = rh.length;

      // Store the API's precise dew point keyed to the rounded values shown,
      // so render() can use it as long as the fields aren't hand-edited.
      const apiDP = (typeof data.current.dew_point_2m === 'number')
        ? data.current.dew_point_2m
        : null;
      apiOutdoor = (apiDP != null) ? { temp: tempNum, rh: rhNum, dp: apiDP } : null;

      const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      $('out-lbl').textContent = `Outdoor · ${loc.name} · ${time}`;
      setLast({ temp, rh, time, dp: apiDP });

      render();
      setTimeout(() => jump(fields.inTemp), 100);

    } catch {
      $('out-lbl').textContent = navigator.onLine
        ? `Outdoor · ${loc.name} (failed — enter manually)`
        : `Outdoor · ${loc.name} (offline — enter manually)`;
    }

    if (btn) { btn.textContent = 'Fetch Live'; btn.disabled = false; }
  }

  // ── Restore last reading (so the app is useful offline / on reopen) ──
  function restoreLast() {
    const loc = getSaved();
    const last = getLast();
    if (!loc || !last) return;
    fields.outTemp.value = last.temp; pLen.outTemp = String(last.temp).length;
    fields.outRH.value   = last.rh;   pLen.outRH   = String(last.rh).length;
    // Recover the precise API dew point if we saved one with this reading.
    if (typeof last.dp === 'number') {
      apiOutdoor = { temp: parseInt(last.temp, 10), rh: parseInt(last.rh, 10), dp: last.dp };
    }
    const tail = navigator.onLine ? `${last.time} (last)` : `${last.time} (offline)`;
    $('out-lbl').textContent = `Outdoor · ${loc.name} · ${tail}`;
  }

  // ── Auto-advance inputs ──
  function wire(input, key, next, allowNeg) {
    input.addEventListener('input', e => {
      let v = e.target.value.replace(allowNeg ? /[^\d-]/g : /\D/g, '');
      if (allowNeg) {
        // keep at most one leading '-'
        const neg = v[0] === '-';
        v = (neg ? '-' : '') + v.replace(/-/g, '').slice(0, 3);
      } else {
        v = v.slice(0, 3);
      }
      e.target.value = v;
      const go = done(v, pLen[key]);
      pLen[key] = v.length;
      render();
      if (go && next) setTimeout(() => jump(next), 30);
    });

    // Learn-on-edit: if you hand-correct a field within 30s of a scan, and
    // the corrected value differs from what the scan put there, remember it
    // so the same OCR mistake auto-fixes next time.
    input.addEventListener('change', () => {
      const scanned = lastScanValues[key];
      if (scanned == null) return;
      if (Date.now() - lastScanAt > 30000) return;   // only just after a scan
      const corrected = parseInt(input.value, 10);
      if (isNaN(corrected)) return;
      if (corrected !== scanned) {
        learnFix(key, scanned, corrected);
        // Stop tracking this field so we don't double-learn from further edits.
        delete lastScanValues[key];
      }
    });
  }

  // ── Clear readings only (keep location) ──
  function clearReadings() {
    Object.values(fields).forEach(f => f.value = '');
    Object.keys(pLen).forEach(k => pLen[k] = 0);
    clearLast();
    apiOutdoor = null;
    lastScanValues = {};   // forget the in-flight scan so a Clear can't mis-learn
    const loc = getSaved();
    if (loc) $('out-lbl').textContent = `Outdoor · ${loc.name}`;
    render();
    const fb = $('fetch-btn');
    if (fb) fb.focus(); else setTimeout(() => jump(fields.outTemp), 50);
  }

  // ── History log ──────────────────────────────────────────────────────
  function getLog() {
    try { return JSON.parse(localStorage.getItem(LS_LOG)) || []; } catch { return []; }
  }
  function setLog(arr) {
    try { localStorage.setItem(LS_LOG, JSON.stringify(arr)); } catch {}
  }

  // Auto-log: once a complete reading settles (debounced), save it. The
  // debounce avoids logging every keystroke; the dedupe keeps an unchanged
  // reading from piling up identical rows.
  let _logTimer = null;
  function scheduleAutoLog() {
    clearTimeout(_logTimer);
    if (current.oDP === null || current.iDP === null) return;
    _logTimer = setTimeout(autoLog, 1500);
  }

  function autoLog() {
    if (current.oDP === null || current.iDP === null) return;
    const loc = getSaved();
    const place = loc ? loc.name : '';
    const oDP = +current.oDP.toFixed(1);
    const iDP = +current.iDP.toFixed(1);
    const log = getLog();
    // Skip if it matches the most recent entry.
    if (log.length && log[0].oDP === oDP && log[0].iDP === iDP && log[0].place === place) return;
    log.unshift({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      t: Date.now(),
      label: current.label,
      color: current.color,
      oDP, iDP, place
    });
    if (log.length > 50) log.length = 50;   // cap the list
    setLog(log);
    renderLog();
  }

  function deleteLogEntry(id) {
    setLog(getLog().filter(e => e.id !== id));
    renderLog();
  }

  function clearLog() {
    setLog([]);
    renderLog();
  }

  function fmtLogDate(t) {
    const d = new Date(t);
    return d.toLocaleDateString([], { month:'short', day:'numeric' }) +
           ' ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  function renderLog() {
    const log = getLog();
    const list = $('hist-list');
    const clear = $('hist-clear');
    if (!list) return;
    if (!log.length) {
      list.innerHTML = '<div class="hist-empty">No saved readings yet.</div>';
      clear.style.display = 'none';
      return;
    }
    clear.style.display = 'block';
    list.innerHTML = log.map(e => `
      <div class="hist-row">
        <div class="hist-main">
          <span class="hist-label" style="color:${e.color || TX}">${e.label || ''}</span>
          <span class="hist-date">${fmtLogDate(e.t)}</span>
          <span class="hist-vals">Out ${e.oDP}° / In ${e.iDP}°${e.place ? ' · ' + e.place : ''}</span>
        </div>
        <button class="hist-del" onclick="deleteLogEntry('${e.id}')" aria-label="delete reading">×</button>
      </div>`).join('');
  }

  // ── 📷 Scan (on-device OCR of a thermostat display) ───────────────────
  let _tessLoading = null;
  function loadTesseract() {
    if (window.Tesseract) return Promise.resolve(window.Tesseract);
    if (_tessLoading) return _tessLoading;
    _tessLoading = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
      s.onload  = () => resolve(window.Tesseract);
      s.onerror = () => { _tessLoading = null; reject(new Error('Tesseract failed to load')); };
      document.head.appendChild(s);
    });
    return _tessLoading;
  }

  function setScanStatus(msg, isError) {
    const el = $('scan-status');
    if (!el) return;
    el.textContent = msg || '';
    el.classList.toggle('show', !!msg);
    el.classList.toggle('error', !!isError);
  }

  function triggerScan() { const f = $('scan-file'); if (f) f.click(); }

  // Flatten Tesseract word boxes regardless of v5 output shape.
  function collectWords(data) {
    if (data.words && data.words.length) return data.words;
    const out = [];
    (data.blocks || []).forEach(b =>
      (b.paragraphs || []).forEach(p =>
        (p.lines || []).forEach(l =>
          (l.words || []).forEach(w => out.push(w)))));
    return out;
  }

  // Turn recognised words into numeric tokens with layout metadata.
  // We capture cx (horizontal centre) because the Honeywell screen lays
  // OUTDOOR and INDOOR out side-by-side (left/right), not stacked.
  function scanTokens(words) {
    const toks = [];
    words.forEach(w => {
      const text = (w.text || '').trim();
      const m = text.match(/-?\d+(?:\.\d+)?/);
      if (!m) return;
      const val = parseFloat(m[0]);
      if (isNaN(val)) return;
      const bb = w.bbox || { x0:0, y0:0, x1:0, y1:0 };
      toks.push({
        val,
        pct: /%/.test(text),
        h:  bb.y1 - bb.y0,         // font size proxy
        cx: (bb.x0 + bb.x1) / 2,   // horizontal position
        cy: (bb.y0 + bb.y1) / 2    // vertical position
      });
    });
    return toks;
  }

  // Stitch split digits back together. The huge temp numerals on the
  // thermostat frequently OCR as two separate single-digit tokens
  // (e.g. "66" → "6" "6", or "42" → "4" "2"). We merge single-digit
  // tokens that sit on the same row, close together, at a similar height
  // *to each other* (not relative to the screen's biggest font, so it
  // works for the medium-font outdoor temp as well as the giant indoor one).
  function mergeSplitDigits(toks) {
    const singles = toks.filter(t => !t.pct && t.val >= 0 && t.val <= 9);
    const rest    = toks.filter(t => !(!t.pct && t.val >= 0 && t.val <= 9));
    const used = new Set();
    const order = singles
      .map((t, i) => i)
      .sort((a, b) => (Math.round(singles[a].cy/40) - Math.round(singles[b].cy/40)) || (singles[a].cx - singles[b].cx));
    const merged = [];
    for (const i of order) {
      if (used.has(i)) continue;
      const cur = { ...singles[i] };
      used.add(i);
      let changed = true;
      while (changed) {
        changed = false;
        for (const j of order) {
          if (used.has(j)) continue;
          const o = singles[j];
          const sameRow  = Math.abs(o.cy - cur.cy) <= cur.h * 0.5;
          const closeX   = (o.cx - cur.cx) > 0 && (o.cx - cur.cx) <= cur.h * 1.5;
          const similarH = Math.abs(o.h - cur.h) <= Math.max(cur.h, o.h) * 0.30;
          if (sameRow && closeX && similarH) {
            cur.val = parseInt(String(Math.trunc(cur.val)) + String(Math.trunc(o.val)), 10);
            cur.cx  = (cur.cx + o.cx) / 2;
            used.add(j);
            changed = true;
          }
        }
      }
      merged.push(cur);
    }
    return rest.concat(merged);
  }

  // From a column of tokens, pick a temperature (biggest font) + humidity.
  function classifyBand(group, medH) {
    let temp = null, rh = null;
    const nonPct = group.filter(t => !t.pct);
    const tempCands = nonPct.filter(t => t.val >= -60 && t.val <= 130)
                            .sort((a, b) => b.h - a.h);     // biggest font first
    if (tempCands.length) temp = tempCands[0].val;
    const tempTok = tempCands[0];

    const pcts = group.filter(t => t.pct && t.val >= 0 && t.val <= 100);
    if (pcts.length) {
      rh = pcts[0].val;
    } else {
      const rhCands = nonPct.filter(t => t !== tempTok && t.val >= 1 && t.val <= 100 && t.h <= medH * 1.15)
                            .sort((a, b) => a.h - b.h);      // smallest font first
      if (rhCands.length) rh = rhCands[0].val;
    }
    return { temp, rh };
  }

  // Last-resort scrape straight from the OCR text.
  function scrapeRaw(text) {
    const t = text || '';
    let rh = null, temp = null;
    const pm = t.match(/(\d{1,3})\s*%/);
    if (pm) { const v = +pm[1]; if (v >= 0 && v <= 100) rh = v; }
    const nums = (t.match(/-?\d{1,3}(?:\.\d)?/g) || []).map(Number);
    const tc = nums.find(n => n >= -60 && n <= 130 && n !== rh);
    if (tc != null) temp = tc;
    return { indoor: { temp, rh }, outdoor: { temp:null, rh:null } };
  }

  // Font size of the biggest temperature in a group (0 if none) — used to
  // tell which cluster is the prominent (indoor) reading.
  function bandTempHeight(group) {
    const c = group.filter(t => !t.pct && t.val >= -60 && t.val <= 130)
                   .sort((a, b) => b.h - a.h);
    return c.length ? c[0].h : 0;
  }

  // Layout-aware interpretation that adapts to the display's orientation.
  // We split the numbers into two clusters along whichever axis they spread
  // across more (side-by-side screens spread in X, stacked ones in Y), then
  // only treat it as a two-zone reading if BOTH clusters actually contain a
  // temperature — otherwise it's a single zone (temp + humidity) and we keep
  // it whole. Indoor is the cluster whose temperature is the larger font (the
  // prominent reading, e.g. the giant center number on a Honeywell); the
  // other cluster is outdoor. This avoids hardcoding left/right or top/bottom.
  function interpretScan(words, rawText) {
    let toks = scanTokens(words);
    if (toks.length) {
      toks = mergeSplitDigits(toks);

      const hs = toks.map(t => t.h).sort((a, b) => a - b);
      const medH = hs[Math.floor(hs.length / 2)] || 0;

      const xs = toks.map(t => t.cx), ys = toks.map(t => t.cy);
      const xSpread = Math.max(...xs) - Math.min(...xs);
      const ySpread = Math.max(...ys) - Math.min(...ys);
      const axis = xSpread >= ySpread ? 'cx' : 'cy';
      const vals = toks.map(t => t[axis]);
      const mid  = (Math.min(...vals) + Math.max(...vals)) / 2;

      const a = toks.filter(t => t[axis] <= mid);
      const b = toks.filter(t => t[axis] >  mid);

      // Genuine two-zone only if both clusters have their own temperature.
      const tA = bandTempHeight(a), tB = bandTempHeight(b);
      if (a.length && b.length && tA > 0 && tB > 0) {
        const ca = classifyBand(a, medH);
        const cb = classifyBand(b, medH);
        // Prefer the larger-font temperature as indoor. When the two fonts are
        // ~equal (no size cue), fall back to layout convention: on a stacked
        // display the top zone is indoor; on a side-by-side one, the right.
        const tie = Math.abs(tA - tB) <= Math.max(tA, tB) * 0.15;
        const indoorIsB = tie ? (axis === 'cx') : (tB > tA);
        const indoor  = indoorIsB ? cb : ca;
        const outdoor = indoorIsB ? ca : cb;
        if (indoor.temp != null || indoor.rh != null || outdoor.temp != null || outdoor.rh != null)
          return { indoor, outdoor };
      }

      // Single zone — classify everything together as the indoor reading.
      const single = classifyBand(toks, medH);
      if (single.temp != null || single.rh != null)
        return { indoor: single, outdoor: { temp:null, rh:null } };
    }
    // Fall back to raw-text scraping.
    return scrapeRaw(rawText);
  }

  function setField(key, num) {
    const f = fields[key];
    f.value = String(num);
    pLen[key] = String(num).length;
  }

  // ── Range sanity bounds ───────────────────────────────────────────────
  // Hard physical/plausibility limits. A scanned value outside these is
  // almost certainly an OCR error (e.g. a giant "66" read as "6", or a
  // stray time digit), so we reject it rather than silently logging junk.
  const RANGE = {
    temp: { min: -20, max: 120 },   // °F, generous for indoor+outdoor
    rh:   { min: 1,   max: 100 }    // %
  };
  function inRange(kind, v) {
    const r = RANGE[kind];
    return v != null && v >= r.min && v <= r.max;
  }

  // ── Correction memory ─────────────────────────────────────────────────
  // A lookup table of *your* recurring OCR errors, keyed per field. When a
  // scan fills a field and you then hand-correct it shortly after, we save
  // "scan said X in this field → you meant Y". Next time the scan produces
  // X in that field, we auto-apply Y. This is not machine learning — it's a
  // transparent memory of your specific repeat mistakes. Clearable.
  const LS_FIX = 'ventseal_fixes';
  function getFixes() {
    try { return JSON.parse(localStorage.getItem(LS_FIX)) || {}; } catch { return {}; }
  }
  function setFixes(obj) {
    try { localStorage.setItem(LS_FIX, JSON.stringify(obj)); } catch {}
  }
  // Apply a learned correction for a given field+value, if one exists.
  function applyFix(key, val) {
    if (val == null) return val;
    const fixes = getFixes();
    const k = key + ':' + Math.round(val);
    const rec = fixes[k];
    // Require the correction to have been seen at least twice to trust it,
    // so a one-off typo doesn't poison future scans.
    if (rec && rec.count >= 2) return rec.to;
    return val;
  }
  // Record that, in this field, a scanned value was corrected to another.
  function learnFix(key, fromVal, toVal) {
    if (fromVal == null || toVal == null || fromVal === toVal) return;
    const fixes = getFixes();
    const k = key + ':' + fromVal;
    // Drop any opposing rule (toVal → fromVal) so the two can't oscillate.
    const reverse = key + ':' + toVal;
    if (fixes[reverse] && fixes[reverse].to === fromVal) delete fixes[reverse];
    const rec = fixes[k];
    if (rec && rec.to === toVal) rec.count = Math.min((rec.count || 1) + 1, 9);
    else fixes[k] = { to: toVal, count: 1 };
    setFixes(fixes);
    renderFixIndicator();
  }

  // Show/hide the "forget corrections" control based on how many active
  // (trusted, count>=2) corrections exist.
  function renderFixIndicator() {
    const el = $('fix-clear');
    if (!el) return;
    const fixes = getFixes();
    const active = Object.values(fixes).filter(r => r.count >= 2).length;
    if (active > 0) {
      el.style.display = 'block';
      el.textContent = `⌀ forget scan corrections (${active})`;
    } else {
      el.style.display = 'none';
    }
  }

  function clearFixes() {
    try { localStorage.removeItem(LS_FIX); } catch {}
    renderFixIndicator();
    setScanStatus('Scan corrections cleared', false);
  }

  // Tracks what the last scan put in each field, so we can detect and learn
  // from your subsequent hand-corrections. { key: scannedValue }
  let lastScanValues = {};
  let lastScanAt = 0;

  function applyScan(result) {
    const { indoor, outdoor } = result;
    const filled = [];
    const rejected = [];
    let outdoorFromScan = false;
    lastScanValues = {};
    lastScanAt = Date.now();

    // helper: validate → apply learned fix → set field → track
    const place = (key, raw, kind, labelFn) => {
      if (raw == null) return;
      let v = Math.round(raw);
      if (!inRange(kind, v)) { rejected.push(labelFn(v) + '?'); return; }
      v = applyFix(key, v);              // auto-correct known recurring errors
      setField(key, v);
      lastScanValues[key] = v;          // remember for learn-on-edit
      filled.push(labelFn(v));
      return v;
    };

    place('outTemp', outdoor.temp, 'temp', v => 'out ' + v + '°');
    const oRH = place('outRH', outdoor.rh, 'rh', v => v + '%');
    if (lastScanValues.outTemp != null || oRH != null) outdoorFromScan = true;

    place('inTemp', indoor.temp, 'temp', v => 'in ' + v + '°');
    place('inRH', indoor.rh, 'rh', v => v + '%');

    if (outdoorFromScan) {
      // Outdoor came from a thermostat photo, not the API — drop the API dew
      // point so render() computes from the scanned numbers instead.
      apiOutdoor = null;
      $('out-lbl').textContent = 'Outdoor · from thermostat';
    }
    render();
    return { filled, rejected };
  }

  async function handleScanFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';   // allow re-picking the same file
    if (!file) return;

    const btn = $('scan-btn');
    const orig = btn.textContent;

    if (!navigator.onLine && !window.Tesseract) {
      setScanStatus('Scan needs a connection the first time', true);
      return;
    }

    setScanStatus('reading photo…', false);
    btn.textContent = '···'; btn.disabled = true;

    try {
      const T = await loadTesseract();
      const worker = await T.createWorker('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789%°.' });
      const { data } = await worker.recognize(file, {}, { blocks: true });
      await worker.terminate();

      const words = collectWords(data);
      const result = interpretScan(words, data.text || '');
      const { filled, rejected } = applyScan(result);

      if (filled.length) {
        let msg = 'read ' + filled.join(' · ') + ' — verify';
        if (rejected.length) msg += ' · skipped ' + rejected.join(' ');
        setScanStatus(msg, false);
      } else if (rejected.length) {
        setScanStatus('Reading looked off (' + rejected.join(' ') + ') — enter manually', true);
      } else {
        setScanStatus('Couldn’t read it — enter manually', true);
      }
    } catch {
      setScanStatus('Scan failed — enter manually', true);
    } finally {
      btn.textContent = orig; btn.disabled = false;
    }
  }

  // ── Wire inputs (temp fields allow negative °F) ──
  wire(fields.outTemp, 'outTemp', fields.outRH, true);
  wire(fields.outRH,  'outRH',  fields.inTemp, false);
  wire(fields.inTemp, 'inTemp', fields.inRH,  true);
  wire(fields.inRH,   'inRH',  null, false);

  // ── Init ──
  window.addEventListener('load', () => {
    renderControls();
    restoreLast();
    render();
    renderLog();
    renderFixIndicator();
  });
</script>

<!-- Service worker: offline app shell, scoped to /vent/ -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js', { scope: './' }).catch(() => {});
    });
  }
</script>
</body>
</html>
